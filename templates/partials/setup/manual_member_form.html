<form method="POST" class="row g-3">
    <div class="col-12">
        <label class="form-label">Cargo</label>
        <input type="text" class="form-control" name="role" placeholder="Ex: Scrum Master" required>
    </div>
    <div class="col-12">
        <label class="form-label">Função</label>
        <input type="text" class="form-control" name="function" placeholder="Ex: Gestão" required>
    </div>
    <div class="col-12">
        <label class="form-label">Salário base (R$)</label>
        <input type="number" class="form-control" name="salary" placeholder="0.00" step="0.01">
    </div>
    <div class="col-12">
        <label class="form-label">Valor/hora (R$)</label>
        <input type="number" class="form-control" name="hourly" placeholder="0.00" step="0.01">
    </div>
    <div class="col-12">
        <label class="form-label">Quantidade</label>
        <input type="number" class="form-control" name="quantity" value="1" min="0.25" step="0.25">
    </div>
    <div class="col-12">
        <button type="submit" class="btn btn-primary w-100">Adicionar membro</button>
    </div>
</form>
